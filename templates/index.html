<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIFTY Option Chain · Nexus Options</title>
    <meta name="description" content="Real-time NIFTY option chain with Greeks powered by Zerodha Kite API">
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="dashboard">

    <!-- Header -->
    <header class="dash-header glass-panel">
        <span class="logo-text">⬡ Nexus Options</span>
        <div class="header-right">
            <select id="symbolSelect" class="symbol-select">
                <option value="NIFTY">NIFTY 50</option>
                <option value="BANKNIFTY">BANK NIFTY</option>
            </select>
            <div class="spot-block">
                <div class="spot-label">Spot Price</div>
                <div class="spot-value" id="spotPrice">—</div>
            </div>
            <div class="live-dot" id="liveBadge">Live</div>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </header>

    <!-- Table -->
    <section class="table-card glass-panel">
        <div class="table-meta">
            <h2>Option Chain &nbsp;<span class="sub" id="expiryLabel">Loading…</span></h2>
            <span class="sub">Auto-refresh every 5s</span>
        </div>
        <div class="table-scroll">
            <table class="option-table" id="optionTable">
                <thead>
                    <tr>
                        <th colspan="7" class="ce-head">CALLS</th>
                        <th class="strike-head">STRIKE</th>
                        <th colspan="7" class="pe-head">PUTS</th>
                    </tr>
                    <tr>
                        <!-- CALLS -->
                        <th class="ce-head">Volume</th>
                        <th class="ce-head">OI</th>
                        <th class="ce-head">Chg OI</th>
                        <th class="ce-head">IV %</th>
                        <th class="ce-head">Delta</th>
                        <th class="ce-head">Theta</th>
                        <th class="ce-head">LTP</th>
                        <!-- STRIKE -->
                        <th class="strike-head"></th>
                        <!-- PUTS -->
                        <th class="pe-head">LTP</th>
                        <th class="pe-head">Theta</th>
                        <th class="pe-head">Delta</th>
                        <th class="pe-head">IV %</th>
                        <th class="pe-head">Chg OI</th>
                        <th class="pe-head">OI</th>
                        <th class="pe-head">Volume</th>
                    </tr>
                </thead>
                <tbody id="chainBody">
                    <tr><td colspan="15" style="text-align:center;padding:2.5rem;color:var(--muted)">Loading market data…</td></tr>
                </tbody>
            </table>
        </div>
    </section>

</div>
<script src="/static/js/script.js"></script>
</body>
</html>
