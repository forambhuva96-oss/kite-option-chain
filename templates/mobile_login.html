<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Controller</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --panel-bg: #1e2233;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: var(--panel-bg);
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            text-align: center;
            font-weight: 600;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        #status-box {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .status-active { background-color: var(--success); color: #000; }
        .status-inactive { background-color: var(--text-muted); color: #000; }
        
        .header-meta {
            text-align: center;
        }
        
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header-meta">
            {% if active %}
                <span class="status-badge status-active">● SYSTEM RUNNING</span>
                <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Last Data Ping: {{ last_updated or 'Waiting...' }}</div>
            {% else %}
                <span class="status-badge status-inactive">○ SYSTEM IDLE</span>
            {% endif %}
        </div>

        <h1>Backend Controller</h1>
        <p class="subtitle">Paste your Zerodha Kite request_token below to boot up the Option Chain fetching sequence.</p>

        <form id="token-form">
            <div class="form-group">
                <input type="text" id="request_token" name="request_token" placeholder="Enter request_token..." required autocomplete="off">
            </div>
            <button type="submit" id="submit-btn">Start System</button>
        </form>

        <div id="status-box"></div>
    </div>

    <script>
        document.getElementById('token-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const token = document.getElementById('request_token').value;
            const statusBox = document.getElementById('status-box');
            
            btn.textContent = 'Authenticating...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
            statusBox.style.display = 'none';
            statusBox.className = '';

            try {
                const formData = new URLSearchParams();
                formData.append('request_token', token);

                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                const data = await response.json();

                statusBox.style.display = 'block';
                if (data.status === 'success') {
                    statusBox.classList.add('success');
                    statusBox.textContent = '✅ System Started Successfully!';
                    document.getElementById('request_token').value = ''; // clear
                    setTimeout(() => window.location.reload(), 1500);
                } else {
                    statusBox.classList.add('error');
                    statusBox.textContent = '❌ ' + data.message;
                    btn.textContent = 'Start System';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                }
            } catch (err) {
                statusBox.style.display = 'block';
                statusBox.classList.add('error');
                statusBox.textContent = '❌ Network error communicating with backend.';
                btn.textContent = 'Start System';
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
